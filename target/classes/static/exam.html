<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exam — ExamPortal</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: var(--gray-100); }
    [data-theme="dark"] body { background: #0f172a; }
    [data-theme="dark"] .exam-topbar { background: #1a1a2e; border-color: #1e293b; }
    [data-theme="dark"] .question-card,
    [data-theme="dark"] .q-navigator,
    [data-theme="dark"] .q-progress-card { background: #1a1a2e; border-color: #1e293b; }
    [data-theme="dark"] .question-text { color: #e2e8f0; }
    [data-theme="dark"] .option { background: #1a1a2e; border-color: #1e293b; color: #e2e8f0; }
    [data-theme="dark"] .option:hover { background: #1e1b4b; }
    [data-theme="dark"] .q-nav-dot { background: #1e293b; border-color: #334155; color: #94a3b8; }
    [data-theme="dark"] .exam-title { color: #e2e8f0; }
    [data-theme="dark"] .topbar-title { color: #e2e8f0; }
    [data-theme="dark"] .modal { background: #1a1a2e; }
    [data-theme="dark"] .modal-title { color: #e2e8f0; }
    [data-theme="dark"] .modal-text { color: #94a3b8; }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="exam-topbar">
  <div>
    <div class="exam-title" id="exam-title">Loading exam...</div>
    <div style="font-size:0.78rem;color:var(--gray-400);" id="exam-student"></div>
  </div>
  <div class="timer-widget" id="timer-widget">
    <span class="timer-icon">⏱️</span>
    <span class="timer-time" id="timer-display">00:00</span>
  </div>
  <button class="btn btn-danger-outline" onclick="confirmSubmit()">Submit Exam</button>
</div>

<!-- BODY -->
<div class="exam-body">

  <!-- QUESTION AREA -->
  <div>
    <div class="question-card">
      <div class="question-meta" id="q-meta">Question 1 of 10 — Subject</div>
      <div class="question-text" id="q-text">Loading question...</div>
      <div class="options" id="q-options"></div>
      <div class="exam-nav">
        <button class="btn btn-outline" id="btn-prev" onclick="navigate(-1)">← Previous</button>
        <span style="font-size:0.85rem;color:var(--gray-400);" id="q-counter"></span>
        <button class="btn btn-outline" id="btn-next" onclick="navigate(1)">Next →</button>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="question-panel">
    <div class="q-navigator">
      <div class="q-nav-title">Question Navigator</div>
      <div class="q-nav-grid" id="q-nav-grid"></div>
      <div style="display:flex;gap:8px;margin-top:12px;font-size:0.78rem;color:var(--gray-400);">
        <span style="display:flex;align-items:center;gap:4px;"><span style="width:12px;height:12px;border-radius:2px;background:var(--purple-pale);display:inline-block;"></span> Answered</span>
        <span style="display:flex;align-items:center;gap:4px;"><span style="width:12px;height:12px;border-radius:2px;background:var(--purple-mid);display:inline-block;"></span> Current</span>
      </div>
    </div>
    <div class="q-progress-card">
      <div class="q-progress-title">Progress</div>
      <div class="q-progress-bar"><div class="q-progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="q-progress-labels">
        <span id="progress-answered">0 answered</span>
        <span id="progress-remaining">0 remaining</span>
      </div>
    </div>
    <div class="q-progress-card" style="background:linear-gradient(135deg,var(--purple-deep),var(--purple-main));">
      <div style="font-size:0.85rem;font-weight:600;color:rgba(255,255,255,0.7);margin-bottom:8px;">Time Remaining</div>
      <div style="font-size:2rem;font-weight:700;color:white;font-family:monospace;" id="timer-big">00:00</div>
      <div style="font-size:0.78rem;color:rgba(255,255,255,0.5);margin-top:4px;">Auto-submits when 0</div>
    </div>
  </div>
</div>

<!-- SUBMIT MODAL -->
<div class="modal-overlay" id="submit-modal">
  <div class="modal">
    <div class="modal-icon">⚠️</div>
    <div class="modal-title">Submit Exam?</div>
    <div class="modal-text" id="submit-modal-text">You have answered 0 of 0 questions.</div>
    <div class="modal-actions">
      <button class="btn btn-outline btn-full" onclick="closeModal()">Go Back</button>
      <button class="btn btn-primary btn-full" onclick="submitExam(false)">Submit Now</button>
    </div>
  </div>
</div>

<!-- TIME UP MODAL -->
<div class="modal-overlay" id="timeup-modal">
  <div class="modal">
    <div class="modal-icon">⏰</div>
    <div class="modal-title">Time is Up!</div>
    <div class="modal-text">Your exam has been automatically submitted.</div>
    <div class="modal-actions">
      <button class="btn btn-primary btn-full" onclick="submitExam(true)">View Results</button>
    </div>
  </div>
</div>

<script>
  // API functions to fetch real data
  async function fetchQuestions() {
    try {
      const response = await fetch('/api/questions');
      return await response.json();
    } catch (error) {
      console.error('Error fetching questions:', error);
      return [];
    }
  }

  async function fetchExams() {
    try {
      const response = await fetch('/api/exams');
      return await response.json();
    } catch (error) {
      console.error('Error fetching exams:', error);
      return [];
    }
  }

  async function submitResult(resultData) {
    try {
      const response = await fetch('/api/results', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(resultData)
      });
      return await response.json();
    } catch (error) {
      console.error('Error submitting result:', error);
      return { success: false };
    }
  }

  function getSession() { return JSON.parse(localStorage.getItem('ep_session') || 'null'); }

  // ── STATE ──
  const session = getSession();
  if (!session) window.location.href = 'login.html';

  let examId = parseInt(localStorage.getItem('ep_current_exam'));
  let exam;
  
  // Initialize exam data
  async function initializeExam() {
    try {
      const exams = await fetchExams();
      exam = exams.find(e => e.id === examId);
      if (!exam) {
        window.location.href = 'student.html';
        return;
      }
      
      // Load questions and start the exam
      await loadQuestionsAndStart();
    } catch (error) {
      console.error('Error initializing exam:', error);
      window.location.href = 'student.html';
    }
  }

  // Apply theme
  if (localStorage.getItem('ep_theme') === 'dark') {
    document.documentElement.setAttribute('data-theme','dark');
  }

  function pickRandom(arr, n) {
    const shuffled = [...arr].sort(() => Math.random() - 0.5);
    return shuffled.slice(0, Math.min(n, arr.length));
  }

  let pool;
  let currentQ  = 0;
  let answers   = [];
  let timeLeft  = 0;
  let timerInt  = null;
  let submitted = false;

  // Load questions and start exam
  async function loadQuestionsAndStart() {
    try {
      const allQuestions = await fetchQuestions();
      
      // Filter questions by subject if needed
      let availableQuestions = exam.subject === 'Mixed' 
        ? allQuestions 
        : allQuestions.filter(q => q.subject === exam.subject);
      
      // If no questions match the subject, use all questions
      if (availableQuestions.length === 0) {
        availableQuestions = allQuestions;
      }
      
      // Randomly select questions
      const questionCount = Math.min(exam.questionCount || 5, availableQuestions.length);
      pool = pickRandom(availableQuestions, questionCount);
      
      // Initialize answers array
      answers = new Array(pool.length).fill(null);
      timeLeft = (exam.duration || 10) * 60;
      
      // Update UI
      document.getElementById('exam-title').textContent = exam.title;
      document.getElementById('exam-student').textContent = session.name;
      
      // Start the exam
      renderQuestion();
      startTimer();
      
    } catch (error) {
      console.error('Error loading questions:', error);
      alert('Error loading exam questions. Please try again.');
      window.location.href = 'student.html';
    }
  }

  function renderQuestion() {
    const q = pool[currentQ];
    document.getElementById('q-meta').textContent = `Question ${currentQ+1} of ${pool.length} — ${q.subject}`;
    document.getElementById('q-text').textContent  = q.questionText;
    document.getElementById('q-counter').textContent = `${currentQ+1} / ${pool.length}`;

    const options = [q.optionA, q.optionB, q.optionC, q.optionD];
    document.getElementById('q-options').innerHTML = options.map((o,i) => `
      <div class="option ${answers[currentQ]===i?'selected':''}" onclick="selectAnswer(${i})">
        <div class="option-letter">${String.fromCharCode(65+i)}</div>
        ${o}
      </div>`).join('');

    document.getElementById('btn-prev').disabled = currentQ === 0;
    document.getElementById('btn-next').disabled = currentQ === pool.length - 1;

    renderNav();
    updateProgress();
  }

  function renderNav() {
    document.getElementById('q-nav-grid').innerHTML = pool.map((_,i) => `
      <div class="q-nav-dot ${i===currentQ?'current':answers[i]!==null?'answered':''}" onclick="jumpTo(${i})">${i+1}</div>`).join('');
  }

  function updateProgress() {
    const answered = answers.filter(a => a !== null).length;
    const pct = Math.round((answered / pool.length) * 100);
    document.getElementById('progress-fill').style.width     = pct + '%';
    document.getElementById('progress-answered').textContent = answered + ' answered';
    document.getElementById('progress-remaining').textContent = (pool.length - answered) + ' remaining';
  }

  function selectAnswer(i) {
    answers[currentQ] = i;
    renderQuestion();
  }

  function navigate(dir) {
    const n = currentQ + dir;
    if (n >= 0 && n < pool.length) { currentQ = n; renderQuestion(); }
  }

  function jumpTo(i) { currentQ = i; renderQuestion(); }

  // ── TIMER ──
  function updateTimer() {
    const m = Math.floor(timeLeft / 60);
    const s = timeLeft % 60;
    const txt = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    document.getElementById('timer-display').textContent = txt;
    document.getElementById('timer-big').textContent     = txt;

    const tw = document.getElementById('timer-widget');
    tw.className = 'timer-widget';
    if (timeLeft <= 60)  { tw.classList.add('danger'); }
    else if (timeLeft <= 120) { tw.classList.add('warning'); }
  }

  function startTimer() {
    updateTimer();
    timerInt = setInterval(() => {
      timeLeft--;
      updateTimer();
      if (timeLeft <= 0) {
        clearInterval(timerInt);
        document.getElementById('timeup-modal').classList.add('active');
      }
    }, 1000);
  }

  // ── SUBMIT ──
  function confirmSubmit() {
    const answered = answers.filter(a => a !== null).length;
    document.getElementById('submit-modal-text').textContent =
      `You have answered ${answered} of ${pool.length} questions. ${pool.length - answered > 0 ? 'Unanswered questions will be marked incorrect.' : 'Ready to submit?'}`;
    document.getElementById('submit-modal').classList.add('active');
  }

  function closeModal() {
    document.getElementById('submit-modal').classList.remove('active');
  }

  async function submitExam(auto) {
    if (submitted) return;
    submitted = true;
    clearInterval(timerInt);

    // Calculate score
    let score = 0;
    pool.forEach((q, i) => { 
      const correctIndex = ['A', 'B', 'C', 'D'].indexOf(q.correctOption);
      if (answers[i] === correctIndex) score++; 
    });
    const total      = pool.length;
    const percentage = Math.round((score / total) * 100);
    const grade      = percentage >= 80 ? 'Excellent' : percentage >= 60 ? 'Good' : percentage >= 40 ? 'Average' : 'Needs Improvement';

    // Save result using API
    const result = {
      studentId:  session.id,
      studentName:session.name,
      examId:     exam.id,
      examTitle:  exam.title,
      score, total, percentage, grade,
      answers:    [...answers],
      autoSubmit: auto,
      date:       new Date().toISOString()
    };

    try {
      const response = await submitResult(result);
      if (response.success) {
        localStorage.setItem('ep_last_result', response.id || Date.now().toString());
        window.location.href = 'result.html';
      } else {
        alert('Error submitting exam. Please try again.');
        submitted = false;
        startTimer(); // Restart timer if submission failed
      }
    } catch (error) {
      console.error('Error submitting exam:', error);
      alert('Error submitting exam. Please try again.');
      submitted = false;
      startTimer(); // Restart timer if submission failed
    }
  }

  // ── INIT ──
  initializeExam();
</script>
</body>
</html>
